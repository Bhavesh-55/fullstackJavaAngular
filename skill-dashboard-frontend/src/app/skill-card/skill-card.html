<div
  class="skill-card"
  [class.beginner-skill]="skill().level === 'Beginner'"
  [class.intermediate-skill]="skill().level === 'Intermediate'"
  [class.advanced-skill]="skill().level === 'Advanced'"
>
  <h3>{{ index() + 1 }}. {{ skill().name }}</h3>

  <p><strong>Category:</strong> {{ skill().category }}</p>

  <p><strong>Level:</strong> {{ skill().level }}</p>

  <p>
    <strong>Description:</strong>
    {{ skill().description || 'No description available' }}
  </p>

  <div class="card-actions">
    <a
      class="details-link"
      [routerLink]="['/skills', skill().id]"
    >
      View Details
    </a>
  @if (canManageSkill()) {
    <button
      type="button"
      class="edit-button"
      (click)="onEditClick()"
    >
      Edit
    </button>

    <button
      type="button"
      class="delete-button"
      [disabled]="isDeleting()"
      (click)="onDeleteClick()"
    >
      {{ isDeleting() ? 'Deleting...' : 'Delete' }}
    </button>
  }
  </div>
</div>
